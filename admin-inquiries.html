<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Inquiries | Autro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin-inquiries.css">
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-text">AUTRO</span>
    </a>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="admin.html">Catalog</a></li>
      <li><a href="admin-packages.html">Packages</a></li>
      <li><a href="admin-agents.html">Agents</a></li>
      <li><a href="admin-inquiries.html" class="active">Inquiries</a></li>
    </ul>

    <div class="nav-actions">
      <button id="logoutBtn" class="admin-logout-btn">Logout</button>
    </div>
  </nav>

  <main class="admin-inquiries-page">
    <section class="admin-inquiries-hero">
      <p class="admin-inquiries-kicker">Customer Requests</p>
      <h1 class="admin-inquiries-title">Inquiries Management</h1>
      <p class="admin-inquiries-desc">
        Review incoming rental inquiries, assign agents, and convert them into confirmed orders.
      </p>
    </section>

    <section class="admin-inquiries-controls">
      <select id="statusFilter">
        <option value="all">All</option>
        <option value="new">New</option>
        <option value="assigned">Assigned</option>
        <option value="confirmed">Confirmed</option>
      </select>
    </section>

    <section id="inquiriesList" class="inquiries-list"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
  <script src="auth.js"></script>
  <script src="admin-inquiries.js"></script>
</body>
</html>
