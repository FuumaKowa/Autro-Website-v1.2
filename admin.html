<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin | Autro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <nav>
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-text">AUTRO</span>
    </a>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="furniture.html">Furniture</a></li>
      <li><a href="admin.html">Admin</a></li>
      <li><a href="admin-agents.html">Agents</a></li>
    </ul>

    <div class="nav-actions">
      <button type="button" class="admin-logout-btn" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <main class="admin-page">
    <section class="admin-hero">
      <div>
        <p class="admin-kicker">Catalog Management</p>
        <h1 class="admin-title">Add Furniture Item</h1>
        <p class="admin-desc">
          Upload an image, fill in the product details, and publish directly to the catalog.
        </p>
      </div>
    </section>

    <section class="admin-layout">
      <div class="admin-form-card">
        <div class="admin-card-head">
          <h2>New Item</h2>
          <p>Fields marked required must be filled before publishing.</p>
        </div>

        <form id="adminForm" class="admin-form">
          <div class="admin-field">
            <label for="itemName">Name</label>
            <input type="text" id="itemName" name="itemName" required>
          </div>

          <div class="admin-field">
            <label for="itemPrice">Price (RM)</label>
            <input type="number" id="itemPrice" name="itemPrice" min="0" step="0.01" required>
          </div>

          <div class="admin-field">
            <label for="itemCategory">Category</label>
            <select id="itemCategory" name="itemCategory" required>
              <option value="living">Living</option>
              <option value="bedroom">Bedroom</option>
              <option value="dining">Dining</option>
              <option value="decor">Decor</option>
            </select>
          </div>

          <div class="admin-field">
            <label for="itemDescription">Description</label>
            <textarea id="itemDescription" name="itemDescription" required></textarea>
          </div>

          <div class="admin-field">
            <label for="itemImage">Image</label>
            <input type="file" id="itemImage" name="itemImage" accept="image/*" required>
          </div>

          <div class="admin-preview-wrap">
            <p class="admin-preview-label">Preview</p>
            <img id="imagePreview" class="admin-preview-image" alt="Preview" hidden>
          </div>

          <div class="admin-actions">
            <button type="submit" class="admin-submit-btn" id="submitBtn">Publish Item</button>
            <button type="button" class="admin-secondary-btn" id="resetBtn">Reset</button>
          </div>

          <p class="admin-message" id="adminMessage"></p>
        </form>
      </div>

      <div class="admin-list-card">
        <div class="admin-card-head">
          <h2>Current Catalog</h2>
          <p>Live data from Supabase.</p>
        </div>

        <div id="catalogList" class="catalog-list"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
  <script src="admin.js"></script>
</body>
</html>
